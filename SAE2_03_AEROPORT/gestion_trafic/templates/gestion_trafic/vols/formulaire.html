{% extends 'gestion_trafic/base.html' %}

{% block content %}
<div class="form-card">
    <h3 class="form-header">{% if object %}Modifier{% else %}Programmer{% endif %} un Vol</h3>
    <div class="form-body">

        {% if form.non_field_errors %}
            <div class="alert alert-danger">
                <strong>Attention :</strong> {{ form.non_field_errors }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Vérifier les pistes & Enregistrer</button>
                <a href="{% url 'liste_vols' %}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
