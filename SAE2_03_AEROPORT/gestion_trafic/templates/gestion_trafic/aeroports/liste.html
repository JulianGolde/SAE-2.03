{% extends 'gestion_trafic/base.html' %}

{% block content %}
<div class="page-header">
    <h2>Liste des Aéroports</h2>
    <a href="{% url 'ajouter_aeroport' %}" class="btn btn-success">+ Ajouter un Aéroport</a>
</div>

<div class="data-card">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Pays</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for aeroport in aeroports %}
            <tr>
                <td>{{ aeroport.id }}</td>
                <td><strong>{{ aeroport.nom }}</strong></td>
                <td>{{ aeroport.pays }}</td>
                <td>
                    <a href="{% url 'modifier_aeroport' aeroport.id %}" class="btn btn-warning">Modifier</a>
                    <a href="{% url 'supprimer_aeroport' aeroport.id %}" class="btn btn-danger">Supprimer</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align: center;">Aucun aéroport enregistré.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
