{% extends "base.html" %}

{% block content %}
  <h1>Supprimer Aéroports</h1>

  <p>Êtes-vous sûr de vouloir supprimer "{{ object }}" ?</p>

  <form method="post">
    {% csrf_token %}

    <!-- Bouton de confirmation -->
    <button type="submit" class="btn btn-danger">
      Confirmer la suppression
    </button>

    <!-- Lien de retour sécurisé -->
    <a href="{% url 'liste_aeroports' %}" class="btn btn-secondary">
      Annuler
    </a>
  </form>
{% endblock %}
